name: CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Run Test Suite (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install CPU-only PyTorch
        run: |
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu

      - name: Install package (no-deps to avoid reinstalling torch)
        run: |
          pip install -e . --no-deps

      - name: Install remaining dependencies
        run: |
          pip install \
            numpy "Pillow>=10.2.0" scikit-learn pandas \
            matplotlib seaborn tqdm \
            pytest pytest-cov

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --tb=long --cov=src/plantdx --cov-report=term-missing --no-cov-on-fail

  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install lint tools
        run: pip install "ruff>=0.4.0"

      - name: Ruff lint
        run: ruff check src/ scripts/ tests/ --select E,F,W,I,UP --output-format github

  docker:
    name: Docker Smoke Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate Dockerfile syntax
        run: docker build --check . || docker build --no-cache --dry-run . 2>/dev/null || echo "Syntax check skipped (older Docker)"

      - name: Verify package structure
        run: |
          python -c "
          import ast, sys
          from pathlib import Path
          errors = []
          for f in Path('src').rglob('*.py'):
              try:
                  ast.parse(f.read_text())
              except SyntaxError as e:
                  errors.append(f'{f}: {e}')
          if errors:
              print('Syntax errors:', errors)
              sys.exit(1)
          print(f'All Python files parse cleanly ({len(list(Path(\"src\").rglob(\"*.py\")))} files)')
          "
