name: Bug Report
description: Report a bug or unexpected behaviour in PlantDx
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in the details below.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the behaviour.
      placeholder: |
        1. Load checkpoint with `PlantDiseaseClassifier.from_checkpoint(...)`
        2. Call `predict(...)` on image X
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        Please complete the following:
      value: |
        - OS: [e.g. Ubuntu 22.04]
        - Python version: [e.g. 3.11]
        - PyTorch version: [e.g. 2.2.0]
        - GPU: [e.g. NVIDIA RTX 3090 / CPU only]
        - PlantDx version: [e.g. v2.0.0]
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / tracebacks
      render: shell
